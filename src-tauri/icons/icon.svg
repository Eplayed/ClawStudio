<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0f1629"/>
    </linearGradient>
    <linearGradient id="claw" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06d6d6"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>
  
  <!-- Border glow -->
  <rect x="20" y="20" width="984" height="984" rx="160" fill="none" stroke="#06d6d6" stroke-width="4" opacity="0.3"/>
  
  <!-- Claw mark - stylized "C" shape with claws -->
  <g transform="translate(512, 512)" filter="url(#glow)">
    <!-- Main claw pad -->
    <ellipse cx="0" cy="80" rx="140" ry="100" fill="url(#claw)" opacity="0.9"/>
    
    <!-- Three claw marks -->
    <path d="M-120,-180 Q-100,-280 -60,-320 Q-40,-280 -80,-180" fill="url(#claw)"/>
    <path d="M0,-200 Q20,-320 60,-360 Q80,-320 40,-200" fill="url(#claw)"/>
    <path d="M120,-180 Q140,-280 180,-320 Q200,-280 160,-180" fill="url(#claw)"/>
    
    <!-- Inner detail -->
    <ellipse cx="0" cy="80" rx="60" ry="40" fill="#0a0e1a" opacity="0.5"/>
  </g>
  
  <!-- Text "CS" -->
  <text x="512" y="780" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="120" font-weight="700" fill="#06d6d6" opacity="0.8">CS</text>
</svg>
